repositories:
  - name: Specification
    id: specification
  - name: JVM
    id: lionweb-jvm
  - name: MPS
    id: lionweb-mps
  - name: TypeScript
    id: lionweb-typescript

serializations:
  - path: lionweb-jvm/core/src/test/resources/serialization/lioncore.json
    kind: m3
    repo: Java
  - path: lionweb-typescript/packages/build/artifacts/core/v2023_1/lioncore.json
    kind: m3
    repo: TypeScript
  - path: specification/2023.1/metametamodel/lioncore.json
    kind: spec
    repo: specification

